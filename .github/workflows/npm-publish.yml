name: Publish Package

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Update npm
        run: npm install -g npm@latest
      - run: npm ci
      - uses: reedyuk/npm-version@1.1.1
        with:
          version: ${{github.ref_name}}
      - name: Sync src/lib/package.json version with root package.json
        run: |
          node -e "const fs=require('fs'); const path='src/lib/package.json'; const root=JSON.parse(fs.readFileSync('package.json')); const lib=JSON.parse(fs.readFileSync(path)); if(lib.version===root.version){console.log('Already up-to-date'); process.exit(0);} lib.version=root.version; fs.writeFileSync(path, JSON.stringify(lib,null,2)+'\n'); console.log('Updated',path,'to',root.version);"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/package.json
          if git diff --cached --quiet; then echo "No changes to commit"; else git commit -m "chore(release): sync src/lib package version to ${{github.ref_name}}" && git push origin HEAD:refs/heads/${{ github.event.release.target_commitish }}; fi
      - run: npm run build:lib
      - name: Prepare dist/package.json
        run: |
          set -euo pipefail
          # Ensure dist exists and has its own package.json generated by the build
          if [ ! -d dist ]; then echo "dist directory not found"; exit 1; fi
          if [ ! -f dist/package.json ]; then echo "dist/package.json not found — expected build to generate it"; exit 1; fi
          # Sync version in dist/package.json with root package.json
          node -e "const fs=require('fs'); const root=JSON.parse(fs.readFileSync('package.json')); const p='dist/package.json'; const d=JSON.parse(fs.readFileSync(p)); if(d.version===root.version){console.log(p,'already has version',d.version); process.exit(0);} d.version=root.version; fs.writeFileSync(p, JSON.stringify(d,null,2)+'\n'); console.log('Updated',p,'with version',root.version);"
      - name: Fix package.json issues inside dist (optional)
        run: |
          npm --prefix ./dist pkg fix || true
      - name: Debug dist/package.json
        run: |
          echo "----- dist/package.json -----"
          cat dist/package.json || true
          echo "----- dist ls -----"
          ls -la dist || true
      - name: Normalize dist/package.json (ensure correct name, version and repository)
        run: |
          node -e "const fs=require('fs'); const root=require('./package.json'); const srcExists=fs.existsSync('src/lib/package.json'); const src=srcExists? require('./src/lib/package.json'): null; const p='dist/package.json'; const d=JSON.parse(fs.readFileSync(p)); const wantedName= src? src.name : root.name; const wantedVersion=root.version; let changed=false; if(d.name!==wantedName){console.log('name:',d.name,'->',wantedName); d.name=wantedName; changed=true;} if(d.version!==wantedVersion){console.log('version:',d.version,'->',wantedVersion); d.version=wantedVersion; changed=true;} // ensure repository.url exists and matches root
          const normalizeRepo=(r)=>{ if(!r) return null; if(typeof r==='string') return r.replace(/^git\+/, '').replace(/\.git$/,''); if(r.url) return r.url.replace(/^git\+/, '').replace(/\.git$/,''); return null; };
          const wantedRepo = normalizeRepo(root.repository) || (process.env.GITHUB_REPOSITORY? 'https://github.com/'+process.env.GITHUB_REPOSITORY : null);
          if(wantedRepo){ if(!d.repository) { d.repository = { type: 'git', url: wantedRepo }; console.log('repository: set ->',wantedRepo); changed=true; } else { const currentRepo=normalizeRepo(d.repository); if(currentRepo!==wantedRepo){ console.log('repository:',currentRepo,'->',wantedRepo); d.repository = { type: 'git', url: wantedRepo }; changed=true; } } }
          if(changed){fs.writeFileSync(p, JSON.stringify(d,null,2)+'\n'); console.log('Updated',p);} else {console.log(p,'already correct');}"
      - name: Pack dist and verify package.json inside tarball
        run: |
          set -euo pipefail
          PACKAGE_DIR=dist
          VERSION=$(node -e "console.log(require('./${PACKAGE_DIR}/package.json').version)")
          echo "Package version: $VERSION (from ${PACKAGE_DIR}/package.json)"
          # create tarball in workspace
          # ensure we pack the local folder, not a package from the registry
          TARFILE=$(npm pack "./$PACKAGE_DIR")
          echo "Created tarball: $TARFILE"
          # extract package.json from tarball and print
          mkdir -p verify_unpack
          tar -xzf "$TARFILE" -C verify_unpack
          echo "----- package.json inside tarball -----"
          cat verify_unpack/package/package.json
          # read version from inside tarball
          INNER_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('verify_unpack/package/package.json')).version)")
          INNER_NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('verify_unpack/package/package.json')).name)")
          echo "Inner package name: $INNER_NAME, version: $INNER_VERSION"
          if [ "$INNER_VERSION" != "$VERSION" ]; then
            echo "Error: version inside tarball ($INNER_VERSION) does not match dist/package.json ($VERSION)"; exit 1
          fi
          echo "Tarball verified."
          # make TARFILE available to next step
          echo "TARFILE=$TARFILE" >> $GITHUB_ENV
      - name: Publish verified tarball to npm (use tag for prerelease versions)
        run: |
          set -euo pipefail
          PACKAGE_DIR=dist
          VERSION=$(node -e "console.log(require('./${PACKAGE_DIR}/package.json').version)")
          TARFILE=${{ env.TARFILE }}
          if [[ "$VERSION" == *-* ]]; then
            TAG=$(echo "$VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-([^\.]+).*/\1/')
            echo "Detected prerelease tag: $TAG"
            npm publish "$TARFILE" --tag "$TAG"
          else
            echo "Publishing as latest"
            npm publish "$TARFILE"
          fi
