name: Publish Package

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Update npm
        run: npm install -g npm@latest
      - run: npm ci
      - uses: reedyuk/npm-version@1.1.1
        with:
          version: ${{github.ref_name}}
      - name: Sync src/lib/package.json version with root package.json
        run: |
          node -e "const fs=require('fs'); const path='src/lib/package.json'; const root=JSON.parse(fs.readFileSync('package.json')); const lib=JSON.parse(fs.readFileSync(path)); if(lib.version===root.version){console.log('Already up-to-date'); process.exit(0);} lib.version=root.version; fs.writeFileSync(path, JSON.stringify(lib,null,2)+'\n'); console.log('Updated',path,'to',root.version);"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/package.json
          if git diff --cached --quiet; then echo "No changes to commit"; else git commit -m "chore(release): sync src/lib package version to ${{github.ref_name}}" && git push origin HEAD:refs/heads/${{ github.event.release.target_commitish }}; fi
      - run: npm run build:lib
      - name: Prepare dist/package.json
        run: |
          set -euo pipefail
          # Ensure dist exists and has its own package.json generated by the build
          if [ ! -d dist ]; then echo "dist directory not found"; exit 1; fi
          if [ ! -f dist/package.json ]; then echo "dist/package.json not found — expected build to generate it"; exit 1; fi
          # Sync version in dist/package.json with root package.json
          node -e "const fs=require('fs'); const root=JSON.parse(fs.readFileSync('package.json')); const p='dist/package.json'; const d=JSON.parse(fs.readFileSync(p)); if(d.version===root.version){console.log(p,'already has version',d.version); process.exit(0);} d.version=root.version; fs.writeFileSync(p, JSON.stringify(d,null,2)+'\n'); console.log('Updated',p,'with version',root.version);"
      - name: Fix package.json issues inside dist (optional)
        run: |
          npm --prefix ./dist pkg fix || true
      - name: Publish to npm from dist (use tag for prerelease versions)
        run: |
          set -euo pipefail
          PACKAGE_DIR=dist
          VERSION=$(node -e "console.log(require('./${PACKAGE_DIR}/package.json').version)")
          echo "Package version: $VERSION (from ${PACKAGE_DIR}/package.json)"
          if [[ "$VERSION" == *-* ]]; then
            TAG=$(echo "$VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-([^\.]+).*/\1/')
            echo "Detected prerelease tag: $TAG"
            npm publish "$PACKAGE_DIR" --tag "$TAG"
          else
            echo "Publishing as latest"
            npm publish "$PACKAGE_DIR"
          fi
